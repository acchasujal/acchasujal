name: Generate Contribution Snake

# The only scheduled automation in this repo, by design.
# platane/snk is the standard, actively maintained implementation of this
# pattern — chosen specifically because it needs no external API keys
# (only the default GITHUB_TOKEN) and has a stable, widely-used output format.
#
# Everything else in the README (stats, top languages, activity graph,
# typing header) is a hosted/static image URL with zero maintenance cost —
# no Action, no secret, nothing to break silently.

on:
  schedule:
    - cron: "0 0 * * *"   # once a day, midnight UTC
  workflow_dispatch: {}     # allow manual trigger from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: acchasujal
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Push snake output to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
